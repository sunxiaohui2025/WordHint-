<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordHint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; min-height: 540px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; background: #f7f8fa; color: #202124;
    }
    .container { display: flex; flex-direction: column; height: 100%; }
    button, input { font: inherit; }
    button:focus-visible, input:focus-visible { outline: 2px solid #c65d3a; outline-offset: 2px; }
    .header { background: #fff; padding: 16px 18px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8eaed; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-mark { width:34px; height:34px; display:grid; place-items:center; border-radius:8px; background:#c65d3a; color:#fff; font-size:19px; font-weight:700; }
    .header h1 { font-size: 17px; font-weight: 650; letter-spacing: 0; }
    .header .version { font-size: 11px; color:#80868b; margin-top:2px; }
    .controls { padding: 14px 18px; background: #fff; border-bottom: 1px solid #e8eaed; }
    .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .control-row:last-child { margin-bottom: 0; }
    .control-row label { font-weight: 500; color: #3c4043; }

    /* Toggle */
    .toggle { position: relative; width: 44px; height: 24px; display: inline-block; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.3s; border-radius:24px; }
    .toggle .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:.3s; border-radius:50%; }
    .toggle input:checked + .slider { background-color:#c65d3a; }
    .toggle input:checked + .slider:before { transform:translateX(20px); }

    /* Library checkbox group */
    .library-section { margin-top: 6px; }
    .library-section .section-label { font-size: 12px; font-weight:600; color: #5f6368; margin-bottom: 8px; }
    .library-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .library-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #3c4043; cursor: pointer; padding: 7px 8px; border:1px solid #e8eaed; border-radius: 6px; transition: background 0.15s, border-color .15s; }
    .library-item:hover { background: #fdf5f2; border-color:#ddb3a5; }
    .library-item input[type="checkbox"] { accent-color: #c65d3a; width: 15px; height: 15px; margin: 0; }
    .library-item .lib-count { font-size: 10px; color: #bbb; margin-left: 2px; }
    .library-actions { display: flex; gap: 6px; margin-top: 6px; }
    .lib-btn { padding: 5px 10px; border: 1px solid #dadce0; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; color: #5f6368; }
    .lib-btn:hover { background:#fdf1ed; color:#a9472b; }

    /* Font size */
    .font-size-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .font-size-row input[type="range"] { flex: 1; accent-color: #c65d3a; }
    .font-size-row .font-size-value { font-size: 11px; color: #888; min-width: 32px; text-align: right; }

    .stats { padding: 9px 18px; background: #fdf8f6; border-bottom: 1px solid #e8eaed; display: flex; gap: 12px; font-size: 12px; color: #5f6368; }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-value { font-weight: 650; color: #a9472b; }
    .tabs { display: flex; border-bottom: 2px solid #eee; background: #fff; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: #999; transition: all 0.2s; }
    .tab-btn:hover { color: #a9472b; background:#fdf8f6; }
    .tab-btn.active { color: #a9472b; border-bottom: 2px solid #c65d3a; margin-bottom: -2px; }
    .tab-content { flex: 1; overflow-y: auto; max-height: 260px; }
    .tab-panel { display: none; padding: 8px 0; }
    .tab-panel.active { display: block; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 18px; border-bottom: 1px solid #f1f3f4; font-size: 13px; min-height:44px; }
    .list-item:hover { background: #fafafa; }
    .list-item-word { font-weight: 600; color: #202124; }
    .list-item-meaning { color: #888; font-size: 12px; margin-left: 8px; }
    .list-item-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
    .list-item-delete:hover { color: #e74c3c; background: #fde8e8; }
    .empty-state { text-align: center; padding: 30px 16px; color: #bbb; }
    .empty-state-icon { font-size: 32px; margin-bottom: 8px; }
    .footer { padding: 12px 18px; background: #fff; border-top: 1px solid #e8eaed; }
    .footer-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .btn-export { width: 100%; padding: 8px 10px; border: 1px solid #ddb3a5; border-radius: 4px; background: #fff; color: #a9472b; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-export:hover { background: #fdf1ed; }
    .btn-export:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-export:active { transform: scale(0.98); }
    .cloud-sync,.phone-sync { padding:12px 18px; background:#fdf8f6; border-top:1px solid #efc2b3; }
    .cloud-title,.phone-sync-title { font-weight:650; color:#3c4043; margin-bottom:7px; }
    .cloud-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .cloud-grid .wide { grid-column:1/-1; }
    .cloud-input { min-width:0; width:100%; padding:8px 9px; border:1px solid #dadce0; border-radius:5px; background:#fff; }
    .cloud-actions { display:flex; gap:7px; margin-top:8px; }
    .cloud-actions button { flex:1; }
    .cloud-user { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .cloud-note { min-height:16px; margin-top:6px; color:#5f6368; font-size:11px; }
    .phone-sync-title { font-weight:650; color:#3c4043; margin-bottom:7px; }
    .phone-sync-row { display:flex; gap:7px; }
    .phone-sync-input { min-width:0; flex:1; padding:8px 9px; border:1px solid #dadce0; border-radius:5px; background:#fff; }
    .phone-sync-btn { border:0; border-radius:5px; padding:8px 12px; color:#fff; background:#c65d3a; cursor:pointer; font-weight:600; white-space:nowrap; }
    .phone-sync-btn:disabled { opacity:.55; cursor:wait; }
    .phone-sync-status { min-height:16px; margin-top:6px; color:#5f6368; font-size:11px; }
    .processing { text-align: center; padding: 8px 16px; background: #fdf1ed; color: #a9472b; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; margin: 0; }
    .spinner { width: 14px; height: 14px; border: 2px solid #efc2b3; border-top: 2px solid #c65d3a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand"><div class="brand-mark">W</div><div><h1>WordHint</h1><div class="version">本地保存 · 支持同步恢复</div></div></div>
    </div>
    <div class="controls">
      <div class="control-row">
        <label>启用翻译标注</label>
        <label class="toggle"><input type="checkbox" id="enableToggle" checked><span class="slider"></span></label>
      </div>
      <div class="library-section">
        <div class="section-label">翻译词库</div>
        <div class="library-grid" id="libraryGrid">
          <!-- <label class="library-item"><input type="checkbox" data-lib="compulsory"><span>义务教育</span><span class="lib-count">1,902词</span></label> -->
          <label class="library-item"><input type="checkbox" data-lib="gaokao_diff"><span>高考词库</span><span class="lib-count">1,751词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="cet4_diff"><span>四级词库</span><span class="lib-count">1,517词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="cet6_diff"><span>六级词库</span><span class="lib-count">1,034词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="postgrad_diff"><span>考研词库</span><span class="lib-count">305词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="ielts_diff"><span>雅思词库</span><span class="lib-count">1,864词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="toefl_diff"><span>托福词库</span><span class="lib-count">4,632词</span></label>
          <label class="library-item"><input type="checkbox" data-lib="gre_diff"><span>GRE</span><span class="lib-count">3,394词</span></label>
        </div>
        <div class="library-actions">
          <button class="lib-btn" id="selectAllBtn">全选</button>
          <button class="lib-btn" id="deselectAllBtn">全不选</button>
          <button class="lib-btn" id="cet6PrefillBtn">六级+</button>
        </div>
      </div>
      <div class="control-row" style="margin-top:8px;">
        <label>标注字号</label>
        <div class="font-size-row">
          <input type="range" id="fontSizeSlider" min="10" max="18" value="12" step="1">
          <span class="font-size-value" id="fontSizeValue">12px</span>
        </div>
      </div>
    </div>
    <div class="stats"><div class="stat-item">标注词数：<span class="stat-value" id="annotatedCount">-</span></div></div>
    <div class="processing" id="processing" style="display:none;"><div class="spinner"></div><span>正在分析页面词汇...</span></div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="whitelist">熟词本</button>
      <button class="tab-btn" data-tab="wordbook">学习名单</button>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="whitelistPanel"><div id="whitelistItems"></div></div>
      <div class="tab-panel" id="wordbookPanel"><div id="wordbookItems"></div></div>
    </div>
    <div class="cloud-sync">
      <div class="cloud-title">WordHint 云同步</div>
      <div id="cloudLoggedOut">
        <div class="cloud-grid">
          <input class="cloud-input wide" id="cloudURL" type="url" placeholder="https://你的服务器域名">
          <input class="cloud-input" id="cloudName" placeholder="昵称（注册时填写）">
          <input class="cloud-input" id="cloudEmail" type="email" placeholder="邮箱">
          <input class="cloud-input wide" id="cloudPassword" type="password" minlength="8" placeholder="密码（至少 8 位）">
        </div>
        <div class="cloud-actions"><button class="btn-export" id="cloudRegisterBtn">注册</button><button class="phone-sync-btn" id="cloudLoginBtn">登录</button></div>
      </div>
      <div id="cloudLoggedIn" style="display:none">
        <div class="cloud-user"><span id="cloudIdentity"></span><button class="lib-btn" id="cloudLogoutBtn">退出</button></div>
        <button class="phone-sync-btn" id="cloudSyncBtn" style="width:100%;margin-top:8px">立即双向同步</button>
      </div>
      <div class="cloud-note" id="cloudStatus">登录后，电脑和手机无需处于同一网络</div>
    </div>
    <div class="phone-sync">
      <div class="phone-sync-title">局域网直连（备用）</div>
      <div class="phone-sync-row">
        <input class="phone-sync-input" id="phoneSyncURL" type="url" placeholder="App 显示的 http://.../api/import">
        <button class="phone-sync-btn" id="phoneSyncBtn">同步</button>
      </div>
      <div class="phone-sync-status" id="phoneSyncStatus">先在 iPhone 的同步中心开启无线接收</div>
    </div>
    <div class="footer">
      <div class="footer-actions">
        <button class="btn-export" id="exportAllBtn">备份数据</button>
        <button class="btn-export" id="importBtn">合并备份</button>
      </div>
      <button class="btn-export" id="exportBtn">导出学习名单 CSV</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
